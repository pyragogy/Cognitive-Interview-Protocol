      proposed_text: |
        The Embodied Foundation is the developmental anchor that grounds early cognition
        in physical, sensory-motor inquiry rather than screen-mediated abstraction.
        It establishes the baseline expectation that learning requires physical manipulation
        and friction. This foundation is not a developmental milestone to be reached and
        left behind — it is a precondition for the learner's capacity to engage
        AI-mediated friction productively. A learner who has not developed it cannot
        reliably distinguish between an AI that is correctly resistant and one that is
        malfunctioning.
      rationale: |
        The current definition describes the embodied foundation as a terminal milestone.
        It does not state why the foundation matters in the context of the rest of the
        Pyragogy framework — specifically, in the context of AI interaction. The expert
        argued (exchanges 03–04) that learners without this foundation cannot engage
        critically with AI-generated resistance: they either accept or reject AI output
        on the wrong grounds, without the capacity to evaluate it. Making this downstream
        function explicit in the Definition strengthens the node's connection to the graph
        and clarifies the cost of bypassing this phase.
      proposed_wikilinks: []

    - section: "risk"
      operation: "append"
      current_text: |
        If the learner bypasses this foundation and is exposed prematurely to frictionless
        generative interfaces, the framework treats this as a risk condition: attention,
        spatial reasoning, frustration tolerance, and embodied problem-solving may become
        under-practiced rather than actively strengthened.
      proposed_text: |
        If the learner bypasses this foundation and is exposed prematurely to frictionless
        generative interfaces, the framework treats this as a risk condition: attention,
        spatial reasoning, frustration tolerance, and embodied problem-solving may become
        under-practiced rather than actively strengthened.

        In the context of AI-mediated learning specifically, the absence of this foundation
        produces a more specific failure mode: the learner cannot evaluate AI-generated
        resistance critically. Unlike [[automation_bias]] — which describes over-trust in
        automation among adults who once had critical capacity — this failure mode is
        constitutive: the evaluative capacity was never built. The learner does not
        gradually defer to the AI; they have no internal reference against which to test
        AI output in the first place.
      rationale: |
        The current Risk section describes the risk in isolation — as a developmental gap
        with no specific connection to AI interaction. The expert argued (exchanges 06–08)
        that the downstream risk in the Pyragogy context is specific: learners lack the
        capacity to distinguish correct AI resistance from AI malfunction. The expert
        also noted a mechanism difference from [[automation_bias]] (exchange-08): the
        issue is not over-trust in automation, but the absence of a reference model for
        what legitimate resistance feels like. This distinction is worth making explicit
        in the Risk section to prevent the node from being read as simply a duplicate
        of the automation_bias concept.
      proposed_wikilinks:
        - "05_systemic_risks/automation_bias"  # already in the node; mention is explicit now

